services:
  # ----------------------------------------------------------------------------
  # Backend API Service
  # ----------------------------------------------------------------------------
  - type: web
    name: toyove-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECURE
        value: true
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # Set this in Render Dashboard
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: http://localhost:5173
      - key: CLIENT_URL_PROD
        value: https://toyove-india-jhkr.vercel.app
      - key: VERCEL_PROJECT_SLUG
        value: toyove-india-jhkr
      - key: JWT_ACCESS_EXPIRES_IN
        value: 30d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ADMIN_SEED_FIRST_NAME
        value: test
      - key: ADMIN_SEED_LAST_NAME
        value: admin
      - key: ADMIN_SEED_EMAIL
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: ADMIN_SEED_ROLE
        value: super_admin

  # ----------------------------------------------------------------------------
  # Frontend Static Site Service
  # ----------------------------------------------------------------------------
  - type: web
    name: toyove-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://toyovoindia.onrender.com/api
